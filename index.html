<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cégvezető</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f3;
  --surface: #ffffff;
  --surface-2: #f0f0ee;
  --border: rgba(0,0,0,0.1);
  --text: #1a1a18;
  --text-muted: #888780;
  --accent: #3b6de8;
  --accent-bg: #e8eeff;
  --accent-text: #1a3db5;
  --danger: #e24b4a;
  --danger-bg: #fceaea;
  --success: #2d9e6b;
  --success-bg: #e6f7ef;
  --radius: 8px;
  --nav-h: 64px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── Desktop layout ── */
.sidebar {
  width: 240px; background: var(--surface); border-right: 0.5px solid var(--border);
  padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 4px;
  position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto; z-index: 50;
}
.main { margin-left: 240px; padding: 2rem; min-height: 100vh; }

/* ── Mobile bottom nav ── */
.bottom-nav {
  display: none; position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--nav-h); background: var(--surface); border-top: 0.5px solid var(--border);
  z-index: 100; align-items: stretch;
}
.bottom-nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; cursor: pointer; padding: 0.5rem 0; border: none; background: none;
  color: var(--text-muted); font-size: 10px; font-family: inherit; transition: color 0.15s;
}
.bottom-nav-item i { font-size: 22px; }
.bottom-nav-item.active { color: var(--accent); }

/* Mobile top bar */
.top-bar {
  display: none; position: sticky; top: 0; background: var(--surface);
  border-bottom: 0.5px solid var(--border); padding: 0 1rem; height: 52px;
  align-items: center; z-index: 50;
}
.top-bar-title { font-size: 17px; font-weight: 600; }

@media (max-width: 700px) {
  .sidebar { display: none; }
  .main { margin-left: 0; padding: 1rem; padding-bottom: calc(var(--nav-h) + 1rem); }
  .bottom-nav { display: flex; }
  .top-bar { display: flex; }
}

/* Sidebar items */
.logo { font-size: 17px; font-weight: 600; padding: 0.25rem 0.75rem 1.25rem; }
.nav-section { font-size: 11px; font-weight: 500; color: var(--text-muted); padding: 0.5rem 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.5rem; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 0.55rem 0.75rem; border-radius: var(--radius); cursor: pointer; font-size: 14px; color: var(--text); transition: background 0.1s; border: none; background: none; width: 100%; font-family: inherit; text-align: left; }
.nav-item:hover { background: var(--surface-2); }
.nav-item.active { background: var(--accent-bg); color: var(--accent-text); font-weight: 500; }
.nav-item i { font-size: 17px; }

/* Page header */
.page-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
.page-title { font-size: 20px; font-weight: 500; }
.page-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

/* Buttons */
button { cursor: pointer; font-family: inherit; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 0.5rem 1rem; border-radius: var(--radius); font-size: 14px; font-weight: 500; border: none; transition: all 0.1s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #2d5cd4; }
.btn-primary:active { transform: scale(0.98); }
.btn-ghost { background: transparent; border: 0.5px solid var(--border); color: var(--text); }
.btn-ghost:hover { background: var(--surface-2); }
.btn-sm { padding: 0.3rem 0.65rem; font-size: 13px; }
.btn-icon { padding: 6px; border-radius: var(--radius); background: transparent; border: none; color: var(--text-muted); display: inline-flex; align-items: center; }
.btn-icon:hover { background: var(--surface-2); color: var(--text); }

/* Cards */
.card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.25rem; }
.card + .card { margin-top: 0.75rem; }

/* Stats grid */
.stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 1.25rem; }
@media (min-width: 500px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
.stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 0.875rem 1rem; }
.stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.stat-value { font-size: 22px; font-weight: 500; }

/* Plan cards */
.plans-grid { display: grid; gap: 0.75rem; }
.plan-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden; }
.plan-header { padding: 1rem 1.25rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 0.75rem; cursor: pointer; }
.plan-title { font-size: 15px; font-weight: 500; }
.plan-meta { font-size: 13px; color: var(--text-muted); margin-top: 2px; line-height: 1.4; }
.plan-body { padding: 0 1rem 1rem; border-top: 0.5px solid var(--border); }
.plan-body.collapsed { display: none; }

/* Progress */
.progress-wrap { margin: 0.6rem 0 0; }
.progress-bar { height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
.progress-label { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

/* Tasks */
.task-list { margin-top: 0.75rem; display: flex; flex-direction: column; gap: 2px; }
.task-item { display: flex; align-items: flex-start; gap: 8px; padding: 0.5rem; border-radius: var(--radius); }
.task-item:hover { background: var(--surface-2); }
.task-check { width: 18px; height: 18px; border: 1.5px solid var(--border); border-radius: 4px; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 2px; }
.task-check.done { background: var(--success); border-color: var(--success); color: #fff; }
.task-text { flex: 1; font-size: 14px; line-height: 1.4; }
.task-text.done { text-decoration: line-through; color: var(--text-muted); }
.task-actions { flex-shrink: 0; }

/* Subtasks */
.subtask-list { margin-left: 26px; margin-top: 4px; border-left: 2px solid var(--border); padding-left: 10px; display: flex; flex-direction: column; gap: 2px; }
.subtask-item { display: flex; align-items: center; gap: 8px; padding: 0.3rem 0.4rem; border-radius: var(--radius); }
.subtask-item:hover { background: var(--surface-2); }
.subtask-check { width: 14px; height: 14px; border: 1.5px solid var(--border); border-radius: 3px; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.subtask-check.done { background: var(--success); border-color: var(--success); color: #fff; }
.subtask-text { flex: 1; font-size: 13px; }
.subtask-text.done { text-decoration: line-through; color: var(--text-muted); }

/* Add row */
.add-row { display: flex; gap: 8px; margin-top: 0.5rem; }
.add-row input { flex: 1; min-width: 0; padding: 0.45rem 0.75rem; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 14px; background: var(--surface); color: var(--text); font-family: inherit; }
.add-row input:focus { outline: none; border-color: var(--accent); }
.add-sub-row { display: flex; gap: 6px; margin-top: 4px; margin-left: 26px; }
.add-sub-row input { flex: 1; min-width: 0; padding: 0.35rem 0.6rem; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 13px; background: var(--surface); color: var(--text); font-family: inherit; }
.add-sub-row input:focus { outline: none; border-color: var(--accent); }

/* Badges */
.badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.badge-blue { background: var(--accent-bg); color: var(--accent-text); }
.badge-green { background: var(--success-bg); color: var(--success); }

/* Company info */
.info-grid { display: grid; grid-template-columns: 1fr; gap: 0.875rem; }
@media (min-width: 500px) { .info-grid { grid-template-columns: 1fr 1fr; } }
.info-field-label { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
.info-field-value { font-size: 15px; }

/* Forms */
.form-group { margin-bottom: 0.875rem; }
.form-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.form-input { width: 100%; padding: 0.5rem 0.75rem; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 14px; font-family: inherit; background: var(--surface); color: var(--text); }
.form-input:focus { outline: none; border-color: var(--accent); }
textarea.form-input { min-height: 80px; resize: vertical; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: flex-end; justify-content: center; z-index: 200; }
@media (min-width: 600px) { .modal-overlay { align-items: center; } }
.modal { background: var(--surface); border-radius: 16px 16px 0 0; padding: 1.25rem; width: 100%; max-height: 90vh; overflow-y: auto; }
@media (min-width: 600px) { .modal { border-radius: 12px; width: 480px; max-width: 95vw; max-height: 80vh; } }
.modal-title { font-size: 17px; font-weight: 500; margin-bottom: 1rem; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem; }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 1rem; }
@media (min-width: 600px) { .modal-handle { display: none; } }
.hidden { display: none !important; }

/* Notes */
#notes-area { width: 100%; min-height: 400px; padding: 1rem; border: none; border-radius: 12px; font-size: 14px; font-family: inherit; background: var(--surface); color: var(--text); line-height: 1.7; resize: vertical; }
#notes-area:focus { outline: none; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── Login ── */
#login-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; padding: 1.5rem;
}
.login-box {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: 16px; padding: 2rem 1.75rem; width: 100%; max-width: 360px;
  text-align: center;
}
.login-icon { font-size: 40px; color: var(--accent); margin-bottom: 1rem; }
.login-title { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
.login-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 1.5rem; }
.login-input {
  width: 100%; padding: 0.65rem 1rem; font-size: 18px; letter-spacing: 0.25em;
  text-align: center; border: 0.5px solid var(--border); border-radius: var(--radius);
  font-family: inherit; background: var(--surface); color: var(--text);
  margin-bottom: 0.875rem;
}
.login-input:focus { outline: none; border-color: var(--accent); }
.login-btn { width: 100%; padding: 0.65rem; font-size: 15px; font-weight: 500; border-radius: var(--radius); background: var(--accent); color: #fff; border: none; cursor: pointer; font-family: inherit; }
.login-btn:hover { background: #2d5cd4; }
.login-btn:active { transform: scale(0.98); }
.login-error { font-size: 13px; color: var(--danger); margin-top: 0.5rem; min-height: 18px; }
</style>
</head>
<body>

<!-- Login screen -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-icon"><i class="ti ti-lock"></i></div>
    <div class="login-title">Cégvezető</div>
    <div class="login-sub">Add meg a jelszót a belépéshez</div>
    <input class="login-input" type="password" id="login-input" placeholder="••••••••" maxlength="20" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Belépés</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- Desktop sidebar -->
<aside class="sidebar">
  <div class="logo"><i class="ti ti-building"></i> Cégvezető</div>
  <span class="nav-section">Áttekintés</span>
  <button class="nav-item active" onclick="showPage('dashboard',this)"><i class="ti ti-layout-dashboard"></i> Irányítópult</button>
  <button class="nav-item" onclick="showPage('company',this)"><i class="ti ti-info-circle"></i> Céginformáció</button>
  <span class="nav-section">Tervezés</span>
  <button class="nav-item" onclick="showPage('plans',this)"><i class="ti ti-list-check"></i> Tervek és feladatok</button>
  <button class="nav-item" onclick="showPage('notes',this)"><i class="ti ti-notes"></i> Jegyzetek</button>
</aside>

<!-- Mobile top bar -->
<div class="top-bar">
  <div class="top-bar-title" id="top-bar-title"><i class="ti ti-layout-dashboard"></i> Irányítópult</div>
</div>

<!-- Main content -->
<main class="main" id="main-content"></main>

<!-- Mobile bottom nav -->
<nav class="bottom-nav">
  <button class="bottom-nav-item active" id="bnav-dashboard" onclick="showPage('dashboard',this,'dashboard')">
    <i class="ti ti-layout-dashboard"></i><span>Főoldal</span>
  </button>
  <button class="bottom-nav-item" id="bnav-company" onclick="showPage('company',this,'company')">
    <i class="ti ti-info-circle"></i><span>Cég</span>
  </button>
  <button class="bottom-nav-item" id="bnav-plans" onclick="showPage('plans',this,'plans')">
    <i class="ti ti-list-check"></i><span>Tervek</span>
  </button>
  <button class="bottom-nav-item" id="bnav-notes" onclick="showPage('notes',this,'notes')">
    <i class="ti ti-notes"></i><span>Jegyzetek</span>
  </button>
</nav>

<!-- Modal -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Mégse</button>
      <button class="btn btn-primary" id="modal-save">Mentés</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xausvinlfcdcgkkjjlox.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhdXN2aW5sZmNkY2dra2pqbG94Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MjUzODgsImV4cCI6MjA5ODQwMTM4OH0.Qgf7X662VSnM-iCw6F3jPyRo4xZmodVT_dTpqITx-PE';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function doLogin() {
  const val = document.getElementById('login-input').value;
  const btn = document.querySelector('.login-btn');
  btn.textContent = '...'; btn.disabled = true;
  const { data: row } = await sb.from('settings').select('value').eq('key','password').single();
  btn.textContent = 'Belépés'; btn.disabled = false;
  if (row && val === row.value) {
    sessionStorage.setItem('auth', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('login-input').value = '';
    loadData();
  } else {
    const err = document.getElementById('login-error');
    err.textContent = 'Hibás jelszó, próbáld újra.';
    document.getElementById('login-input').value = '';
    document.getElementById('login-input').focus();
    setTimeout(() => err.textContent = '', 2500);
  }
}
if (sessionStorage.getItem('auth') !== '1') {
  setTimeout(() => document.getElementById('login-input').focus(), 100);
} else {
  document.getElementById('login-screen').style.display = 'none';
}

let data = { company:{ name:'', type:'', address:'', phone:'', email:'', taxnum:'', founded:'', description:'' }, plans:[], notes:'' };
let saving = false;

async function loadData() {
  const { data: rows } = await sb.from('app_data').select('data').eq('id','main').single();
  if (rows?.data && Object.keys(rows.data).length > 0) {
    data = rows.data;
    if (!data.company) data.company = { name:'', type:'', address:'', phone:'', email:'', taxnum:'', founded:'', description:'' };
    if (!data.plans) data.plans = [];
    if (!data.notes) data.notes = '';
  }
  render();
}

async function save() {
  if (saving) return;
  saving = true;
  await sb.from('app_data').upsert({ id:'main', data, updated_at: new Date().toISOString() });
  saving = false;
}

sb.channel('app_data_changes')
  .on('postgres_changes', { event:'UPDATE', schema:'public', table:'app_data', filter:'id=eq.main' }, payload => {
    const incoming = payload.new.data;
    if (JSON.stringify(incoming) !== JSON.stringify(data)) {
      data = incoming;
      if (!data.company) data.company = { name:'', type:'', address:'', phone:'', email:'', taxnum:'', founded:'', description:'' };
      if (!data.plans) data.plans = [];
      if (!data.notes) data.notes = '';
      render();
    }
  })
  .subscribe();

let currentPage = 'dashboard';
let expandedPlans = {};

const pageTitles = {
  dashboard: '<i class="ti ti-layout-dashboard"></i> Irányítópult',
  company:   '<i class="ti ti-info-circle"></i> Céginformáció',
  plans:     '<i class="ti ti-list-check"></i> Tervek',
  notes:     '<i class="ti ti-notes"></i> Jegyzetek'
};

function showPage(page, el, bnavId) {
  currentPage = page;
  document.getElementById('top-bar-title').innerHTML = pageTitles[page];
  // Desktop nav
  document.querySelectorAll('.sidebar .nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.sidebar .nav-item').forEach(n => {
    if (n.textContent.trim().toLowerCase().includes(page === 'dashboard' ? 'irányító' : page === 'company' ? 'céginform' : page === 'plans' ? 'tervek' : 'jegyzetek')) n.classList.add('active');
  });
  // Mobile nav
  document.querySelectorAll('.bottom-nav-item').forEach(n => n.classList.remove('active'));
  const bid = bnavId || page;
  const bel = document.getElementById('bnav-' + bid);
  if (bel) bel.classList.add('active');
  render();
}

function render() {
  const main = document.getElementById('main-content');
  if (currentPage === 'dashboard') main.innerHTML = renderDashboard();
  else if (currentPage === 'company') main.innerHTML = renderCompany();
  else if (currentPage === 'plans') main.innerHTML = renderPlans();
  else if (currentPage === 'notes') main.innerHTML = renderNotes();
}

/* ── Dashboard ── */
function renderDashboard() {
  const totalTasks = data.plans.reduce((s,p) => s + p.tasks.length, 0);
  const doneTasks  = data.plans.reduce((s,p) => s + p.tasks.filter(t=>t.done).length, 0);
  const totalSub   = data.plans.reduce((s,p) => s + p.tasks.reduce((ss,t) => ss+(t.subtasks||[]).length,0), 0);
  const activePlans = data.plans.filter(p => !p.done).length;
  const pct = totalTasks ? Math.round(doneTasks/totalTasks*100) : 0;
  return `
  <div class="page-header">
    <div>
      <div class="page-title">Irányítópult</div>
      <div class="page-subtitle">${data.company.name || 'Cégnév nincs megadva'}</div>
    </div>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Aktív tervek</div><div class="stat-value">${activePlans}</div></div>
    <div class="stat-card"><div class="stat-label">Összes feladat</div><div class="stat-value">${totalTasks}</div></div>
    <div class="stat-card"><div class="stat-label"><span style="color:var(--success)">Kész</span> feladat</div><div class="stat-value" style="color:var(--success)">${doneTasks}</div></div>
    <div class="stat-card"><div class="stat-label">Alfeladatok</div><div class="stat-value">${totalSub}</div></div>
  </div>
  <div class="card">
    <div style="font-weight:500;margin-bottom:0.875rem;font-size:15px">Összes előrehaladás</div>
    <div class="progress-bar" style="height:8px"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="progress-label" style="margin-top:6px">${pct}% kész · ${doneTasks}/${totalTasks} feladat</div>
  </div>
  ${data.plans.length > 0 ? `<div class="card" style="margin-top:0.75rem">
    <div style="font-weight:500;margin-bottom:0.875rem;font-size:15px">Tervek állapota</div>
    ${data.plans.map(p => {
      const t = p.tasks.length, d = p.tasks.filter(t=>t.done).length;
      const pp = t ? Math.round(d/t*100) : 0;
      return `<div style="margin-bottom:0.875rem">
        <div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px">
          <span>${p.title}</span><span style="color:var(--text-muted)">${d}/${t}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pp}%"></div></div>
      </div>`;
    }).join('')}
  </div>` : `<div class="card" style="margin-top:0.75rem;color:var(--text-muted);font-size:14px;text-align:center;padding:2rem">
    Még nincsenek tervek.<br><button class="btn btn-primary" style="margin-top:0.75rem" onclick="showPage('plans',null,'plans')">Terv létrehozása</button>
  </div>`}`;
}

/* ── Company ── */
function renderCompany() {
  const c = data.company;
  return `
  <div class="page-header">
    <div><div class="page-title">Céginformáció</div></div>
    <button class="btn btn-primary btn-sm" onclick="editCompany()"><i class="ti ti-edit"></i> Szerkesztés</button>
  </div>
  <div class="card">
    <div class="info-grid">
      ${ifield('Cégnév','building',c.name)}
      ${ifield('Típus','briefcase',c.type)}
      ${ifield('Cím','map-pin',c.address)}
      ${ifield('Telefon','phone',c.phone)}
      ${ifield('Email','mail',c.email)}
      ${ifield('Adószám','receipt-tax',c.taxnum)}
      ${ifield('Alapítás éve','calendar',c.founded)}
    </div>
    ${c.description ? `<div style="margin-top:1rem;padding-top:1rem;border-top:0.5px solid var(--border)">
      <div class="info-field-label"><i class="ti ti-file-description" style="font-size:13px"></i>Leírás</div>
      <div style="font-size:14px;line-height:1.6;margin-top:2px">${c.description}</div>
    </div>` : ''}
  </div>`;
}
function ifield(label, icon, val) {
  return `<div>
    <div class="info-field-label"><i class="ti ti-${icon}" style="font-size:13px"></i>${label}</div>
    <div class="info-field-value">${val || '<span style="color:var(--text-muted)">—</span>'}</div>
  </div>`;
}
function editCompany() {
  const c = data.company;
  openModal('Céginformáció szerkesztése', `
    <div class="form-group"><label class="form-label">Cégnév</label><input class="form-input" id="f-name" value="${c.name||''}"></div>
    <div class="form-group"><label class="form-label">Típus (Kft, Bt…)</label><input class="form-input" id="f-type" value="${c.type||''}"></div>
    <div class="form-group"><label class="form-label">Cím</label><input class="form-input" id="f-address" value="${c.address||''}"></div>
    <div class="info-grid" style="gap:0.75rem">
      <div class="form-group"><label class="form-label">Telefon</label><input class="form-input" id="f-phone" value="${c.phone||''}"></div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="f-email" value="${c.email||''}"></div>
    </div>
    <div class="info-grid" style="gap:0.75rem">
      <div class="form-group"><label class="form-label">Adószám</label><input class="form-input" id="f-taxnum" value="${c.taxnum||''}"></div>
      <div class="form-group"><label class="form-label">Alapítás éve</label><input class="form-input" id="f-founded" value="${c.founded||''}"></div>
    </div>
    <div class="form-group"><label class="form-label">Leírás</label><textarea class="form-input" id="f-desc">${c.description||''}</textarea></div>
  `, () => {
    data.company = { name:g('f-name'), type:g('f-type'), address:g('f-address'), phone:g('f-phone'), email:g('f-email'), taxnum:g('f-taxnum'), founded:g('f-founded'), description:g('f-desc') };
    save(); render();
  });
}

/* ── Plans ── */
function renderPlans() {
  return `
  <div class="page-header">
    <div><div class="page-title">Tervek és feladatok</div></div>
    <button class="btn btn-primary btn-sm" onclick="addPlan()"><i class="ti ti-plus"></i> Új terv</button>
  </div>
  <div class="plans-grid">
    ${data.plans.length === 0
      ? `<div class="card" style="color:var(--text-muted);font-size:14px;text-align:center;padding:2rem">Még nincsenek tervek.</div>`
      : data.plans.map((p,pi) => renderPlanCard(p,pi)).join('')}
  </div>`;
}

function renderPlanCard(p, pi) {
  const total = p.tasks.length, done = p.tasks.filter(t=>t.done).length;
  const pct = total ? Math.round(done/total*100) : 0;
  const expanded = expandedPlans[pi] !== false;
  return `<div class="plan-card">
    <div class="plan-header" onclick="togglePlan(${pi})">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <div class="plan-title">${p.title}</div>
          ${p.category ? `<span class="badge badge-blue">${p.category}</span>` : ''}
          ${pct===100 ? `<span class="badge badge-green">Kész</span>` : ''}
        </div>
        ${p.description ? `<div class="plan-meta">${p.description}</div>` : ''}
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          <div class="progress-label">${done}/${total} feladat${total ? ` · ${pct}%` : ''}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:2px;flex-shrink:0">
        <button class="btn-icon" onclick="event.stopPropagation();editPlan(${pi})"><i class="ti ti-edit" style="font-size:16px"></i></button>
        <button class="btn-icon" onclick="event.stopPropagation();deletePlan(${pi})" style="color:var(--danger)"><i class="ti ti-trash" style="font-size:16px"></i></button>
        <i class="ti ti-chevron-${expanded?'up':'down'}" style="font-size:16px;color:var(--text-muted);margin-left:2px"></i>
      </div>
    </div>
    <div class="plan-body ${expanded?'':'collapsed'}">
      <div class="task-list">
        ${p.tasks.map((t,ti) => renderTask(t,pi,ti)).join('')}
      </div>
      <div class="add-row" style="margin-top:0.75rem">
        <input placeholder="Új feladat…" id="nt-${pi}" onkeydown="if(event.key==='Enter')addTask(${pi})">
        <button class="btn btn-ghost btn-sm" onclick="addTask(${pi})"><i class="ti ti-plus"></i></button>
      </div>
    </div>
  </div>`;
}

function renderTask(t, pi, ti) {
  const subs = t.subtasks || [];
  const sd = subs.filter(s=>s.done).length;
  return `<div class="task-item">
    <div class="task-check ${t.done?'done':''}" onclick="toggleTask(${pi},${ti})">
      ${t.done?'<i class="ti ti-check" style="font-size:11px"></i>':''}
    </div>
    <div style="flex:1;min-width:0">
      <div class="task-text ${t.done?'done':''}">${t.text}</div>
      ${subs.length ? `<div style="font-size:12px;color:var(--text-muted);margin-top:1px">${sd}/${subs.length} alfeladat</div>` : ''}
      ${subs.length ? `<div class="subtask-list">${subs.map((s,si)=>renderSubtask(s,pi,ti,si)).join('')}</div>` : ''}
      <div class="add-sub-row">
        <input placeholder="Alfeladat…" id="ns-${pi}-${ti}" onkeydown="if(event.key==='Enter')addSubtask(${pi},${ti})">
        <button class="btn-icon" onclick="addSubtask(${pi},${ti})" style="padding:4px;border:0.5px solid var(--border);border-radius:var(--radius)"><i class="ti ti-corner-down-right" style="font-size:14px"></i></button>
      </div>
    </div>
    <button class="btn-icon" onclick="deleteTask(${pi},${ti})"><i class="ti ti-trash" style="font-size:15px;color:var(--danger)"></i></button>
  </div>`;
}

function renderSubtask(s, pi, ti, si) {
  return `<div class="subtask-item">
    <div class="subtask-check ${s.done?'done':''}" onclick="toggleSubtask(${pi},${ti},${si})">
      ${s.done?'<i class="ti ti-check" style="font-size:9px"></i>':''}
    </div>
    <div class="subtask-text ${s.done?'done':''}" style="flex:1">${s.text}</div>
    <button class="btn-icon" onclick="deleteSubtask(${pi},${ti},${si})" style="padding:2px"><i class="ti ti-x" style="font-size:13px;color:var(--danger)"></i></button>
  </div>`;
}

/* ── Notes ── */
function renderNotes() {
  return `
  <div class="page-header">
    <div><div class="page-title">Jegyzetek</div></div>
    <button class="btn btn-primary btn-sm" onclick="saveNotes()"><i class="ti ti-device-floppy"></i> Mentés</button>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <textarea id="notes-area" placeholder="Ide írd a céggel kapcsolatos gondolataidat…">${data.notes||''}</textarea>
  </div>`;
}
function saveNotes() {
  data.notes = document.getElementById('notes-area').value;
  save();
  const btn = event.currentTarget;
  btn.innerHTML = '<i class="ti ti-check"></i> Elmentve';
  setTimeout(()=>{ btn.innerHTML='<i class="ti ti-device-floppy"></i> Mentés'; },1500);
}

/* ── Actions ── */
function togglePlan(pi) { expandedPlans[pi] = expandedPlans[pi]===false; render(); }
function toggleTask(pi,ti) { data.plans[pi].tasks[ti].done=!data.plans[pi].tasks[ti].done; save(); render(); }
function toggleSubtask(pi,ti,si) { data.plans[pi].tasks[ti].subtasks[si].done=!data.plans[pi].tasks[ti].subtasks[si].done; save(); render(); }
function addTask(pi) {
  const inp=document.getElementById(`nt-${pi}`), text=inp.value.trim();
  if(!text)return;
  data.plans[pi].tasks.push({text,done:false,subtasks:[]});
  save(); expandedPlans[pi]=true; render();
}
function addSubtask(pi,ti) {
  const inp=document.getElementById(`ns-${pi}-${ti}`), text=inp.value.trim();
  if(!text)return;
  if(!data.plans[pi].tasks[ti].subtasks) data.plans[pi].tasks[ti].subtasks=[];
  data.plans[pi].tasks[ti].subtasks.push({text,done:false});
  save(); expandedPlans[pi]=true; render();
}
function deleteTask(pi,ti) { data.plans[pi].tasks.splice(ti,1); save(); render(); }
function deleteSubtask(pi,ti,si) { data.plans[pi].tasks[ti].subtasks.splice(si,1); save(); render(); }
function deletePlan(pi) {
  if(confirm(`Biztosan törlöd: "${data.plans[pi].title}"?`)) { data.plans.splice(pi,1); save(); render(); }
}
function addPlan() {
  openModal('Új terv', `
    <div class="form-group"><label class="form-label">Terv neve *</label><input class="form-input" id="f-ptitle" placeholder="pl. Marketing terv 2025"></div>
    <div class="form-group"><label class="form-label">Kategória</label><input class="form-input" id="f-pcat" placeholder="pl. Marketing, Pénzügy, HR"></div>
    <div class="form-group"><label class="form-label">Leírás</label><textarea class="form-input" id="f-pdesc" placeholder="Rövid leírás…"></textarea></div>
  `, () => {
    const title=g('f-ptitle'); if(!title)return alert('A terv neve kötelező!');
    data.plans.push({title, category:g('f-pcat'), description:g('f-pdesc'), tasks:[], done:false});
    save(); expandedPlans[data.plans.length-1]=true; render();
  });
}
function editPlan(pi) {
  const p=data.plans[pi];
  openModal('Terv szerkesztése', `
    <div class="form-group"><label class="form-label">Terv neve *</label><input class="form-input" id="f-ptitle" value="${p.title}"></div>
    <div class="form-group"><label class="form-label">Kategória</label><input class="form-input" id="f-pcat" value="${p.category||''}"></div>
    <div class="form-group"><label class="form-label">Leírás</label><textarea class="form-input" id="f-pdesc">${p.description||''}</textarea></div>
  `, () => {
    const title=g('f-ptitle'); if(!title)return alert('A terv neve kötelező!');
    data.plans[pi].title=title; data.plans[pi].category=g('f-pcat'); data.plans[pi].description=g('f-pdesc');
    save(); render();
  });
}

/* ── Modal ── */
function openModal(title, body, cb) {
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.getElementById('modal-save').onclick=()=>{ cb(); closeModal(); };
  setTimeout(()=>document.querySelector('#modal-body .form-input')?.focus(),80);
}
function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
function overlayClick(e) { if(e.target===e.currentTarget) closeModal(); }
function g(id) { return (document.getElementById(id)?.value||'').trim(); }

if (sessionStorage.getItem('auth') === '1') loadData(); else render();
</script>
</body>
</html>

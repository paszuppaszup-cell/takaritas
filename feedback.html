<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Visszajelzés</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f3; --surface: #ffffff; --border: rgba(0,0,0,0.1);
  --text: #1a1a18; --text-muted: #888780; --accent: #3b6de8; --radius: 8px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 1.5rem 1rem; }
.wrap { max-width: 480px; margin: 0 auto; }
.header { text-align: center; margin-bottom: 1.5rem; }
.header .icon { font-size: 34px; color: #f59e0b; margin-bottom: 0.5rem; }
.header h1 { font-size: 20px; font-weight: 600; }
.header p { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
.card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 14px; padding: 1.5rem 1.25rem; }
.form-group { margin-bottom: 1rem; }
.form-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
.form-input { width: 100%; padding: 0.6rem 0.75rem; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 15px; font-family: inherit; background: var(--surface); color: var(--text); }
.form-input:focus { outline: none; border-color: var(--accent); }
textarea.form-input { min-height: 100px; resize: vertical; }
.stars { display: flex; gap: 6px; justify-content: center; margin: 0.5rem 0 0; }
.stars i { font-size: 40px; color: #d1d5db; cursor: pointer; transition: transform 0.1s; }
.stars i:hover { transform: scale(1.1); }
.stars i.on { color: #f59e0b; }
.submit-btn { width: 100%; padding: 0.75rem; font-size: 15px; font-weight: 500; border-radius: var(--radius); background: var(--accent); color: #fff; border: none; cursor: pointer; font-family: inherit; margin-top: 0.5rem; }
.submit-btn:hover { background: #2d5cd4; }
.submit-btn:disabled { opacity: 0.6; cursor: default; }
.error-msg { font-size: 13px; color: #e24b4a; margin-top: 0.5rem; text-align: center; min-height: 18px; }
.success-box { text-align: center; padding: 2.5rem 1.5rem; }
.success-box .icon { font-size: 46px; color: #2d9e6b; margin-bottom: 1rem; }
.success-box h2 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
.success-box p { font-size: 14px; color: var(--text-muted); }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="icon"><i class="ti ti-star-filled"></i></div>
    <h1>Értékeld a szolgáltatásunkat</h1>
    <p>A visszajelzésed segít, hogy még jobbak lehessünk.</p>
  </div>
  <div class="card" id="form-card">
    <form id="feedback-form">
      <div class="form-group">
        <label class="form-label" style="text-align:center">Hány csillagot adnál?</label>
        <div class="stars" id="stars">
          <i class="ti ti-star-filled" data-r="1"></i>
          <i class="ti ti-star-filled" data-r="2"></i>
          <i class="ti ti-star-filled" data-r="3"></i>
          <i class="ti ti-star-filled" data-r="4"></i>
          <i class="ti ti-star-filled" data-r="5"></i>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Név (opcionális)</label>
        <input class="form-input" id="f-name" placeholder="Ha meg szeretnéd osztani, kik voltunk">
      </div>
      <div class="form-group">
        <label class="form-label">Szöveges vélemény (opcionális)</label>
        <textarea class="form-input" id="f-comment" placeholder="Ami tetszett, vagy amin változtatnál…"></textarea>
      </div>
      <button class="submit-btn" type="submit" id="submit-btn">Elküldés</button>
      <div class="error-msg" id="error-msg"></div>
    </form>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xausvinlfcdcgkkjjlox.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhdXN2aW5sZmNkY2dra2pqbG94Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MjUzODgsImV4cCI6MjA5ODQwMTM4OH0.Qgf7X662VSnM-iCw6F3jPyRo4xZmodVT_dTpqITx-PE';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const jobId = new URLSearchParams(location.search).get('job') || null;
let rating = 0;

const stars = document.querySelectorAll('#stars i');
stars.forEach(s => {
  s.addEventListener('click', () => {
    rating = Number(s.dataset.r);
    stars.forEach(x => x.classList.toggle('on', Number(x.dataset.r) <= rating));
  });
});

document.getElementById('feedback-form').addEventListener('submit', async e => {
  e.preventDefault();
  const err = document.getElementById('error-msg');
  if (!rating) { err.textContent = 'Kérjük, válassz csillagot.'; return; }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Küldés…'; err.textContent = '';
  const { error } = await sb.from('feedback').insert({
    job_id: jobId, rating,
    customer_name: document.getElementById('f-name').value.trim() || null,
    comment: document.getElementById('f-comment').value.trim() || null
  });
  if (error) {
    btn.disabled = false; btn.textContent = 'Elküldés';
    err.textContent = 'Hiba történt, próbáld újra.';
    return;
  }
  document.getElementById('form-card').innerHTML = `
    <div class="success-box">
      <div class="icon"><i class="ti ti-circle-check"></i></div>
      <h2>Köszönjük a visszajelzést!</h2>
      <p>Nagyon értékeljük, hogy időt szántál rá.</p>
    </div>`;
});
</script>
</body>
</html>

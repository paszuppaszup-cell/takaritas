<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cégvezető</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f3;
  --surface: #ffffff;
  --surface-2: #f0f0ee;
  --border: rgba(0,0,0,0.1);
  --text: #1a1a18;
  --text-muted: #888780;
  --accent: #3b6de8;
  --accent-bg: #e8eeff;
  --accent-text: #1a3db5;
  --danger: #e24b4a;
  --danger-bg: #fceaea;
  --success: #2d9e6b;
  --success-bg: #e6f7ef;
  --radius: 8px;
  --nav-h: 64px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── Desktop layout ── */
.sidebar {
  width: 240px; background: var(--surface); border-right: 0.5px solid var(--border);
  padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 4px;
  position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto; z-index: 50;
}
.main { margin-left: 240px; padding: 2rem; min-height: 100vh; }

/* ── Mobile bottom nav ── */
.bottom-nav {
  display: none; position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--nav-h); background: var(--surface); border-top: 0.5px solid var(--border);
  z-index: 100; align-items: stretch;
}
.bottom-nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; cursor: pointer; padding: 0.5rem 0; border: none; background: none;
  color: var(--text-muted); font-size: 10px; font-family: inherit; transition: color 0.15s;
}
.bottom-nav-item i { font-size: 22px; }
.bottom-nav-item.active { color: var(--accent); }

/* Mobile top bar */
.top-bar {
  display: none; position: sticky; top: 0; background: var(--surface);
  border-bottom: 0.5px solid var(--border); padding: 0 1rem; height: 52px;
  align-items: center; z-index: 50;
}
.top-bar-title { font-size: 17px; font-weight: 600; }

@media (max-width: 700px) {
  .sidebar { display: none; }
  .main { margin-left: 0; padding: 1rem; padding-bottom: calc(var(--nav-h) + 1rem); }
  .bottom-nav { display: flex; }
  .top-bar { display: flex; }
}

/* Sidebar items */
.logo { font-size: 17px; font-weight: 600; padding: 0.25rem 0.75rem 1.25rem; }
.nav-section { font-size: 11px; font-weight: 500; color: var(--text-muted); padding: 0.5rem 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.5rem; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 0.55rem 0.75rem; border-radius: var(--radius); cursor: pointer; font-size: 14px; color: var(--text); transition: background 0.1s; border: none; background: none; width: 100%; font-family: inherit; text-align: left; }
.nav-item:hover { background: var(--surface-2); }
.nav-item.active { background: var(--accent-bg); color: var(--accent-text); font-weight: 500; }
.nav-item i { font-size: 17px; }

/* Page header */
.page-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
.page-title { font-size: 20px; font-weight: 500; }
.page-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

/* Buttons */
button { cursor: pointer; font-family: inherit; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 0.5rem 1rem; border-radius: var(--radius); font-size: 14px; font-weight: 500; border: none; transition: all 0.1s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #2d5cd4; }
.btn-primary:active { transform: scale(0.98); }
.btn-ghost { background: transparent; border: 0.5px solid var(--border); color: var(--text); }
.btn-ghost:hover { background: var(--surface-2); }
.btn-sm { padding: 0.3rem 0.65rem; font-size: 13px; }
.btn-icon { padding: 6px; border-radius: var(--radius); background: transparent; border: none; color: var(--text-muted); display: inline-flex; align-items: center; }
.btn-icon:hover { background: var(--surface-2); color: var(--text); }

/* Cards */
.card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.25rem; }
.card + .card { margin-top: 0.75rem; }

/* Stats grid */
.stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 1.25rem; }
@media (min-width: 500px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
.stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 0.875rem 1rem; }
.stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.stat-value { font-size: 22px; font-weight: 500; }

/* Plan cards */
.plans-grid { display: grid; gap: 0.75rem; }
.plan-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden; }
.plan-header { padding: 1rem 1.25rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 0.75rem; cursor: pointer; }
.plan-title { font-size: 15px; font-weight: 500; }
.plan-meta { font-size: 13px; color: var(--text-muted); margin-top: 2px; line-height: 1.4; }
.plan-body { padding: 0 1rem 1rem; border-top: 0.5px solid var(--border); }
.plan-body.collapsed { display: none; }

/* Progress */
.progress-wrap { margin: 0.6rem 0 0; }
.progress-bar { height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
.progress-label { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

/* Tasks */
.task-list { margin-top: 0.75rem; display: flex; flex-direction: column; gap: 2px; }
.task-item { display: flex; align-items: flex-start; gap: 8px; padding: 0.5rem; border-radius: var(--radius); }
.task-item:hover { background: var(--surface-2); }
.task-check { width: 18px; height: 18px; border: 1.5px solid var(--border); border-radius: 4px; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 2px; }
.task-check.done { background: var(--success); border-color: var(--success); color: #fff; }
.task-text { flex: 1; font-size: 14px; line-height: 1.4; }
.task-text.done { text-decoration: line-through; color: var(--text-muted); }
.task-actions { flex-shrink: 0; }

/* Subtasks */
.subtask-list { margin-left: 26px; margin-top: 4px; border-left: 2px solid var(--border); padding-left: 10px; display: flex; flex-direction: column; gap: 2px; }
.subtask-item { display: flex; align-items: center; gap: 8px; padding: 0.3rem 0.4rem; border-radius: var(--radius); }
.subtask-item:hover { background: var(--surface-2); }
.subtask-check { width: 14px; height: 14px; border: 1.5px solid var(--border); border-radius: 3px; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.subtask-check.done { background: var(--success); border-color: var(--success); color: #fff; }
.subtask-text { flex: 1; font-size: 13px; }
.subtask-text.done { text-decoration: line-through; color: var(--text-muted); }

/* Add row */
.add-row { display: flex; gap: 8px; margin-top: 0.5rem; }
.add-row input { flex: 1; min-width: 0; padding: 0.45rem 0.75rem; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 14px; background: var(--surface); color: var(--text); font-family: inherit; }
.add-row input:focus { outline: none; border-color: var(--accent); }
.add-sub-row { display: flex; gap: 6px; margin-top: 4px; margin-left: 26px; }
.add-sub-row input { flex: 1; min-width: 0; padding: 0.35rem 0.6rem; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 13px; background: var(--surface); color: var(--text); font-family: inherit; }
.add-sub-row input:focus { outline: none; border-color: var(--accent); }

/* Badges */
.badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.badge-blue { background: var(--accent-bg); color: var(--accent-text); }
.badge-green { background: var(--success-bg); color: var(--success); }

/* Company info */
.info-grid { display: grid; grid-template-columns: 1fr; gap: 0.875rem; }
@media (min-width: 500px) { .info-grid { grid-template-columns: 1fr 1fr; } }
.info-field-label { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
.info-field-value { font-size: 15px; }

/* Forms */
.form-group { margin-bottom: 0.875rem; }
.form-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.form-input { width: 100%; padding: 0.5rem 0.75rem; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 14px; font-family: inherit; background: var(--surface); color: var(--text); }
.form-input:focus { outline: none; border-color: var(--accent); }
textarea.form-input { min-height: 80px; resize: vertical; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: flex-end; justify-content: center; z-index: 200; }
@media (min-width: 600px) { .modal-overlay { align-items: center; } }
.modal { background: var(--surface); border-radius: 16px 16px 0 0; padding: 1.25rem; width: 100%; max-height: 90vh; overflow-y: auto; }
@media (min-width: 600px) { .modal { border-radius: 12px; width: 480px; max-width: 95vw; max-height: 80vh; } }
.modal-title { font-size: 17px; font-weight: 500; margin-bottom: 1rem; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem; }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 1rem; }
@media (min-width: 600px) { .modal-handle { display: none; } }
.hidden { display: none !important; }

/* User badge & due date */
.user-badge { display: inline-flex; align-items: center; gap: 3px; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.user-badge.user-1 { background: #dbeafe; color: #1e40af; }
.user-badge.user-2 { background: #f3e8ff; color: #6b21a8; }
.due-badge { display: inline-flex; align-items: center; gap: 3px; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 500; background: var(--surface-2); color: var(--text-muted); }
.due-badge.overdue { background: #fee2e2; color: #b91c1c; }
.due-badge.today { background: #fef3c7; color: #92400e; }

/* Calendar */
.cal-filter { display: flex; gap: 6px; margin-bottom: 0.75rem; flex-wrap: wrap; }
.cal-filter button { padding: 5px 12px; border: 0.5px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); font-size: 13px; cursor: pointer; font-family: inherit; }
.cal-filter button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.cal-group { margin-bottom: 1rem; }
.cal-group-title { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
.cal-item { display: flex; align-items: flex-start; gap: 8px; padding: 0.65rem 0.85rem; background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px; margin-bottom: 4px; }
.cal-item-main { flex: 1; min-width: 0; }
.cal-item-title { font-size: 14px; }
.cal-item-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

/* Calendar month view */
.cal-month-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
.cal-month-title { font-size: 16px; font-weight: 600; }
.cal-month-nav { display: flex; gap: 4px; }
.cal-month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 6px; }
.cal-weekday { text-align: center; font-size: 11px; font-weight: 600; color: var(--text-muted); padding: 4px 0; text-transform: uppercase; }
.cal-day { min-height: 78px; background: var(--bg); border-radius: 6px; padding: 4px 5px; display: flex; flex-direction: column; gap: 2px; cursor: pointer; overflow: hidden; border: 1px solid transparent; }
.cal-day:hover { border-color: var(--border); }
.cal-day.other-month { opacity: 0.35; }
.cal-day.today { border-color: var(--accent); background: var(--accent-bg); }
.cal-day-num { font-size: 12px; font-weight: 500; color: var(--text); }
.cal-day.today .cal-day-num { color: var(--accent-text); }
.cal-day-events { display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
.cal-day-event { font-size: 10px; padding: 1px 4px; border-radius: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
.cal-day-event.user-1 { background: #dbeafe; color: #1e40af; }
.cal-day-event.user-2 { background: #f3e8ff; color: #6b21a8; }
.cal-day-event.none { background: var(--surface-2); color: var(--text); }
.cal-day-event.done { text-decoration: line-through; opacity: 0.6; }
.cal-day-more { font-size: 10px; color: var(--text-muted); padding: 0 4px; }
.cal-view-tabs { display: inline-flex; gap: 0; background: var(--surface); border: 0.5px solid var(--border); border-radius: 6px; overflow: hidden; }
.cal-view-tabs button { padding: 5px 12px; background: transparent; border: 0; color: var(--text-muted); font-size: 13px; cursor: pointer; font-family: inherit; }
.cal-view-tabs button.active { background: var(--accent); color: #fff; }
@media (max-width: 700px) {
  .cal-day { min-height: 56px; padding: 3px 3px; }
  .cal-day-num { font-size: 11px; }
  .cal-day-event { font-size: 9px; padding: 1px 3px; }
  .cal-weekday { font-size: 10px; }
}

/* User indicator in sidebar */
.user-pill { display: flex; align-items: center; gap: 8px; padding: 8px 10px; margin: 0.5rem 0; background: var(--surface-2); border-radius: var(--radius); font-size: 13px; }
.user-pill .user-avatar { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 12px; color: #fff; flex-shrink: 0; }
.user-avatar.user-1 { background: #2563eb; }
.user-avatar.user-2 { background: #7c3aed; }

/* Notes */
.notes-grid { display: grid; gap: 0.75rem; }
.note-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; display: flex; flex-direction: column; gap: 6px; }
.note-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.note-card-title { font-size: 15px; font-weight: 500; flex: 1; min-width: 0; }
.note-card-link { font-size: 12px; color: var(--accent-text); background: var(--accent-bg); border-radius: 4px; padding: 2px 7px; display: inline-flex; align-items: center; gap: 4px; align-self: flex-start; }
.note-card-content { font-size: 14px; color: var(--text-muted); line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.task-note-area { width: 100%; min-height: 60px; margin-top: 6px; padding: 0.45rem 0.65rem; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 13px; font-family: inherit; background: var(--bg); color: var(--text); line-height: 1.6; resize: vertical; }
.task-note-area:focus { outline: none; border-color: var(--accent); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── Login ── */
#login-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; padding: 1.5rem;
}
.login-box {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: 16px; padding: 2rem 1.75rem; width: 100%; max-width: 360px;
  text-align: center;
}
.login-icon { font-size: 40px; color: var(--accent); margin-bottom: 1rem; }
.login-title { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
.login-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 1.5rem; }
.login-input {
  width: 100%; padding: 0.65rem 1rem; font-size: 18px; letter-spacing: 0.25em;
  text-align: center; border: 0.5px solid var(--border); border-radius: var(--radius);
  font-family: inherit; background: var(--surface); color: var(--text);
  margin-bottom: 0.875rem;
}
.login-input:focus { outline: none; border-color: var(--accent); }
.login-btn { width: 100%; padding: 0.65rem; font-size: 15px; font-weight: 500; border-radius: var(--radius); background: var(--accent); color: #fff; border: none; cursor: pointer; font-family: inherit; }
.login-btn:hover { background: #2d5cd4; }
.login-btn:active { transform: scale(0.98); }
.login-error { font-size: 13px; color: var(--danger); margin-top: 0.5rem; min-height: 18px; }
</style>
</head>

<!-- Login screen -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-icon"><i class="ti ti-lock"></i></div>
    <div class="login-title">Cégvezető</div>
    <div class="login-sub">Add meg a jelszót a belépéshez</div>
    <input class="login-input" type="password" id="login-input" placeholder="••••••••" maxlength="20" onkeydown="if(event.key==='Enter')doLogin()">

    <div class="login-error" id="login-error"></div>

</div>

</aside>

<!-- Mobile top bar -->
<div class="top-bar">

<!-- Main content -->
<main class="main" id="main-content"></main>

<!-- Mobile bottom nav -->
<nav class="bottom-nav">

</nav>

</div>

    const { data: row } = await sb.from('settings').select('value').eq('key','password').single();
    if (row && val === row.value) loggedAs = 'user1';
  }
  btn.textContent = 'Belépés'; btn.disabled = false;
  if (loggedAs) {
    sessionStorage.setItem('auth', '1');
    sessionStorage.setItem('currentUser', loggedAs);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('login-input').value = '';

    err.textContent = 'Hibás jelszó, próbáld újra.';

    document.getElementById('login-input').focus();

  }
}

let lastLocalChange = 0;

async function loadData() {

const SUPABASE_FN_URL = SUPABASE_URL + '/functions/v1/notify-telegram';
function notifyTelegram(userId, message) {

function save() {

let pendingRemoteRender = false;

function isEditingField() {
  const el = document.activeElement;
  return el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') && document.getElementById('main-content').contains(el);
}

document.addEventListener('focusout', e => {
  if ((e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') && pendingRemoteRender) {
    pendingRemoteRender = false;
    render();
  }
});

function startRealtimeSync() {
  sb.channel('realtime:app_data')
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'app_data' }, payload => {
      const incoming = payload.new?.data;
      if (!incoming) return;
      if (JSON.stringify(incoming) === JSON.stringify(data)) return;
      // Ignore echoes of our own very-recent edits so re-render doesn't steal focus mid-typing.
      if (Date.now() - lastLocalChange < 1200) return;
      data = incoming;
      if (!data.company) data.company = { name:'', type:'', address:'', phone:'', email:'', taxnum:'', founded:'', description:'' };
      if (!data.plans) data.plans = [];
      if (typeof data.notes === 'string') data.notes = data.notes.trim() ? [{ id:'1', title:'Általános', content: data.notes, link: null }] : [];
      if (!Array.isArray(data.notes)) data.notes = [];
      if (!data.software) data.software = [];
      if (!data.apikeys) data.apikeys = [];
      if (isEditingField()) { pendingRemoteRender = true; return; }
      render();
    })
    .subscribe();
}

function showPage(page, el, bnavId) {
  currentPage = page;
  document.getElementById('top-bar-title').innerHTML = pageTitles[page];
  // Desktop nav
  document.querySelectorAll('.sidebar .nav-item').forEach(n => n.classList.remove('active'));
  const keywords = { dashboard:'irányító', company:'céginform', plans:'tervek', notes:'jegyzetek', software:'szoftver', calendar:'naptár', users:'felhasználók' };
  document.querySelectorAll('.sidebar .nav-item').forEach(n => {
    if (keywords[page] && n.textContent.trim().toLowerCase().includes(keywords[page])) n.classList.add('active');
  });
  // Mobile nav
  document.querySelectorAll('.bottom-nav-item').forEach(n => n.classList.remove('active'));
  const bid = bnavId || page;
  const bel = document.getElementById('bnav-' + bid);
  if (bel) bel.classList.add('active');

function renderTask(t, pi, ti) {
  const subs = t.subtasks || [];
  const sd = subs.filter(s=>s.done).length;
  const noteKey = `${pi}-${ti}`;
  const noteOpen = !!expandedTaskNotes[noteKey];
  const hasNote = !!(t.note && t.note.trim());

        ${dueInfo ? `<span class="due-badge ${dueInfo.cls}"><i class="ti ti-calendar" style="font-size:11px"></i> ${dueInfo.label}</span>` : ''}
      </div>` : ''}
      ${subs.length ? `<div style="font-size:12px;color:var(--text-muted);margin-top:1px">${sd}/${subs.length} alfeladat</div>` : ''}
      ${subs.length ? `<div class="subtask-list">${subs.map((s,si)=>renderSubtask(s,pi,ti,si)).join('')}</div>` : ''}
      <div class="add-sub-row">
        <input placeholder="Alfeladat…" id="ns-${pi}-${ti}" onkeydown="if(event.key==='Enter')addSubtask(${pi},${ti})">

/* ── Notes ── */
function noteLinkValue(link) {
  if (!link) return '';
  if (link.type==='plan') return `plan:${link.pi}`;
  if (link.type==='task') return `task:${link.pi}:${link.ti}`;
  if (link.type==='sub') return `sub:${link.pi}:${link.ti}:${link.si}`;
  return '';
}
function noteLinkLabel(link) {
  if (!link) return null;
  try {
    if (link.type==='plan') return data.plans[link.pi].title;
    if (link.type==='task') return `${data.plans[link.pi].title} › ${data.plans[link.pi].tasks[link.ti].text}`;
    if (link.type==='sub') return `${data.plans[link.pi].title} › ${data.plans[link.pi].tasks[link.ti].text} › ${data.plans[link.pi].tasks[link.ti].subtasks[link.si].text}`;
  } catch(e) { return 'Törölt elem'; }
  return null;
}
function hasLinkedNote(type, pi, ti, si) {
  if (!Array.isArray(data.notes)) return false;
  return data.notes.some(n => {
    if (!n.link) return false;
    if (type==='plan') return n.link.type==='plan' && n.link.pi===pi;
    if (type==='task') return n.link.type==='task' && n.link.pi===pi && n.link.ti===ti;
    if (type==='sub') return n.link.type==='sub' && n.link.pi===pi && n.link.ti===ti && n.link.si===si;
    return false;
  });
}
function buildLinkOptions(selected) {
  let opts = `<option value="">Nincs (szabad jegyzet)</option>`;
  (data.plans||[]).forEach((p, pi) => {
    opts += `<option value="plan:${pi}" ${selected===`plan:${pi}`?'selected':''}>${p.title} [terv]</option>`;
    (p.tasks||[]).forEach((t, ti) => {
      opts += `<option value="task:${pi}:${ti}" ${selected===`task:${pi}:${ti}`?'selected':''}>  ${p.title} › ${t.text} [feladat]</option>`;
      (t.subtasks||[]).forEach((s, si) => {
        opts += `<option value="sub:${pi}:${ti}:${si}" ${selected===`sub:${pi}:${ti}:${si}`?'selected':''}>    ${p.title} › ${t.text} › ${s.text} [alfeladat]</option>`;
      });
    });
  });
  return opts;
}
function parseNoteLink(val) {
  if (!val) return null;
  const p = val.split(':');
  if (p[0]==='plan') return { type:'plan', pi:+p[1] };
  if (p[0]==='task') return { type:'task', pi:+p[1], ti:+p[2] };
  if (p[0]==='sub') return { type:'sub', pi:+p[1], ti:+p[2], si:+p[3] };
  return null;
}
function renderNotes() {
  const notes = Array.isArray(data.notes) ? data.notes : [];
  return `
  <div class="page-header">
    <div><div class="page-title">Jegyzetek</div></div>
    <button class="btn btn-primary btn-sm" onclick="addNote()"><i class="ti ti-plus"></i> Új jegyzet</button>
  </div>
  <div class="notes-grid">
    ${notes.length === 0
      ? `<div class="card" style="color:var(--text-muted);font-size:14px;text-align:center;padding:2rem">Még nincsenek jegyzetek. Kattints az „Új jegyzet" gombra!</div>`
      : notes.map((n,i) => {
          const lbl = noteLinkLabel(n.link);
          return `<div class="note-card">

              <div style="display:flex;gap:2px;flex-shrink:0">
                <button class="btn-icon" onclick="editNote(${i})"><i class="ti ti-edit" style="font-size:15px"></i></button>

            ${n.content ? `<div class="note-card-content">${n.content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>` : ''}

}
function openNoteModal(title, note, cb) {
  openModal(title, `
    <div class="form-group"><label class="form-label">Cím</label><input class="form-input" id="f-ntitle" value="${(note.title||'').replace(/"/g,'&quot;')}" placeholder="Rövid cím…"></div>

function formatDueDate(d) {
  if (!d) return null;
  const due = new Date(d);
  if (isNaN(due)) return null;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const dueDay = new Date(due.getFullYear(), due.getMonth(), due.getDate());
  const diffDays = Math.round((dueDay - today) / 86400000);
  const hasTime = d.length > 10;
  const timeStr = hasTime ? ` ${String(due.getHours()).padStart(2,'0')}:${String(due.getMinutes()).padStart(2,'0')}` : '';
  let label, cls = '';
  if (diffDays < 0) { label = `Lejárt (${due.getFullYear()}.${String(due.getMonth()+1).padStart(2,'0')}.${String(due.getDate()).padStart(2,'0')}${timeStr})`; cls = 'overdue'; }
  else if (diffDays === 0) { label = `Ma${timeStr}`; cls = 'today'; }
  else if (diffDays === 1) { label = `Holnap${timeStr}`; }
  else if (diffDays < 7) { label = `${diffDays} nap múlva${timeStr}`; }
  else { label = `${due.getFullYear()}.${String(due.getMonth()+1).padStart(2,'0')}.${String(due.getDate()).padStart(2,'0')}${timeStr}`; }
  return { label, cls };
}

/* ── Software ── */
/* ── Calendar ── */
let calendarFilter = 'all';
let calendarView = 'month';
let calendarMonth = null;
let calendarSelectedDay = null;
function setCalendarFilter(f) { calendarFilter = f; render(); }
function setCalendarView(v) { calendarView = v; calendarSelectedDay = null; render(); }
function calendarShift(delta) {
  if (!calendarMonth) calendarMonth = new Date();
  const d = new Date(calendarMonth);
  d.setMonth(d.getMonth() + delta);
  calendarMonth = d;
  render();
}
function calendarToday() { calendarMonth = new Date(); calendarSelectedDay = null; render(); }
function selectCalendarDay(iso) { calendarSelectedDay = (calendarSelectedDay===iso) ? null : iso; render(); }

function collectScheduledItems() {
  const items = [];
  (data.plans||[]).forEach((p, pi) => {
    (p.tasks||[]).forEach((t, ti) => {
      if (t.dueDate && (calendarFilter === 'all' || t.assignedTo === calendarFilter)) {
        items.push({ kind:'task', plan: p.title, text: t.text, due: t.dueDate, assignedTo: t.assignedTo, done: t.done, pi, ti, si: null });
      }
      (t.subtasks||[]).forEach((s, si) => {
        if (s.dueDate && (calendarFilter === 'all' || s.assignedTo === calendarFilter)) {
          items.push({ kind:'sub', plan: p.title, text: `${t.text} › ${s.text}`, due: s.dueDate, assignedTo: s.assignedTo, done: s.done, pi, ti, si });
        }
      });
    });
  });
  return items;
}
function renderCalendar() {
  const items = collectScheduledItems();
  items.sort((a,b) => new Date(a.due) - new Date(b.due));

  return `
  <div class="page-header">
    <div><div class="page-title">Naptár</div></div>
    <div class="cal-view-tabs">
      <button class="${calendarView==='month'?'active':''}" onclick="setCalendarView('month')"><i class="ti ti-calendar-month" style="font-size:14px"></i> Hónap</button>
      <button class="${calendarView==='list'?'active':''}" onclick="setCalendarView('list')"><i class="ti ti-list" style="font-size:14px"></i> Lista</button>
    </div>
  </div>
  <div class="cal-filter">
    <button class="${calendarFilter==='all'?'active':''}" onclick="setCalendarFilter('all')">Mindenki</button>
    ${USERS.map(u => `<button class="${calendarFilter===u.id?'active':''}" onclick="setCalendarFilter('${u.id}')">${u.name}</button>`).join('')}
  </div>
  ${calendarView==='month' ? renderCalendarMonth(items) : renderCalendarList(items)}`;
}
function renderCalendarMonth(items) {
  if (!calendarMonth) calendarMonth = new Date();
  const cm = calendarMonth;
  const year = cm.getFullYear();
  const month = cm.getMonth();
  const monthNames = ['Január','Február','Március','Április','Május','Június','Július','Augusztus','Szeptember','Október','November','December'];
  const weekDays = ['H','K','Sze','Cs','P','Szo','V'];
  const firstDay = new Date(year, month, 1);
  const startWeekday = (firstDay.getDay() + 6) % 7; // Monday=0
  const gridStart = new Date(year, month, 1 - startWeekday);
  const days = [];
  for (let i = 0; i < 42; i++) {
    const d = new Date(gridStart);
    d.setDate(gridStart.getDate() + i);
    days.push(d);
  }
  const todayIso = isoDate(new Date());
  const byDay = {};
  items.forEach(it => {
    const k = isoDate(new Date(it.due));
    if (!byDay[k]) byDay[k] = [];
    byDay[k].push(it);
  });

  let selectedItems = null;
  if (calendarSelectedDay && byDay[calendarSelectedDay]) selectedItems = byDay[calendarSelectedDay];

  return `
  <div class="cal-month-bar">
    <div class="cal-month-title">${year}. ${monthNames[month]}</div>
    <div class="cal-month-nav">
      <button class="btn-icon" onclick="calendarShift(-1)"><i class="ti ti-chevron-left"></i></button>
      <button class="btn btn-ghost btn-sm" onclick="calendarToday()">Ma</button>
      <button class="btn-icon" onclick="calendarShift(1)"><i class="ti ti-chevron-right"></i></button>
    </div>
  </div>
  <div class="cal-month-grid">
    ${weekDays.map(w => `<div class="cal-weekday">${w}</div>`).join('')}
    ${days.map(d => {
      const iso = isoDate(d);
      const sameMonth = d.getMonth() === month;
      const isToday = iso === todayIso;
      const dayItems = byDay[iso] || [];
      const shown = dayItems.slice(0, 3);
      const extra = dayItems.length - shown.length;
      return `<div class="cal-day ${sameMonth?'':'other-month'} ${isToday?'today':''} ${calendarSelectedDay===iso?'selected':''}" onclick="selectCalendarDay('${iso}')">
        <div class="cal-day-num">${d.getDate()}</div>
        <div class="cal-day-events">
          ${shown.map(it => {
            const u = it.assignedTo ? getUserById(it.assignedTo) : null;
            const cls = u ? u.color : 'none';
            return `<div class="cal-day-event ${cls} ${it.done?'done':''}" title="${escapeHtml(it.text)}">${escapeHtml(it.text)}</div>`;
          }).join('')}
          ${extra > 0 ? `<div class="cal-day-more">+${extra}</div>` : ''}
        </div>
      </div>`;
    }).join('')}
  </div>
  ${selectedItems ? `<div style="margin-top:1rem">
    <div class="cal-group-title">${calendarSelectedDay} (${selectedItems.length})</div>
    ${selectedItems.map(it => calItemHtml(it)).join('')}
  </div>` : ''}`;
}
function escapeHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function isoDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function calItemHtml(it) {
  const u = it.assignedTo ? getUserById(it.assignedTo) : null;
  const due = formatDueDate(it.due);
  return `<div class="cal-item">
    <div style="margin-top:2px">${it.done ? '<i class="ti ti-check" style="color:var(--success);font-size:16px"></i>' : '<i class="ti ti-circle" style="color:var(--text-muted);font-size:16px"></i>'}</div>
    <div class="cal-item-main">
      <div class="cal-item-title" style="${it.done?'text-decoration:line-through;color:var(--text-muted)':''}">${escapeHtml(it.text)}</div>
      <div class="cal-item-meta">
        <span><i class="ti ti-list-check" style="font-size:11px"></i> ${escapeHtml(it.plan)}</span>
        ${due ? `<span class="due-badge ${due.cls}"><i class="ti ti-clock" style="font-size:11px"></i> ${due.label}</span>` : ''}
        ${u ? `<span class="user-badge ${u.color}"><i class="ti ti-user" style="font-size:11px"></i> ${u.name}</span>` : ''}
      </div>
    </div>
    <button class="btn-icon" onclick="showPage('plans',null,'plans');setTimeout(()=>{expandedPlans[${it.pi}]=true;render();},10)" title="Megnyitás"><i class="ti ti-external-link" style="font-size:15px"></i></button>
  </div>`;
}
function renderCalendarList(items) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const groups = { overdue:[], today:[], tomorrow:[], week:[], later:[] };
  items.forEach(it => {
    const d = new Date(it.due);
    const day = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const diff = Math.round((day - today) / 86400000);
    if (it.done) groups.later.push(it);
    else if (diff < 0) groups.overdue.push(it);
    else if (diff === 0) groups.today.push(it);
    else if (diff === 1) groups.tomorrow.push(it);
    else if (diff < 7) groups.week.push(it);
    else groups.later.push(it);
  });
  const groupLabels = {
    overdue: { title: 'Lejárt', icon: 'alert-triangle' },
    today:   { title: 'Mai', icon: 'calendar-event' },
    tomorrow:{ title: 'Holnapi', icon: 'calendar' },
    week:    { title: 'Ezen a héten', icon: 'calendar-week' },
    later:   { title: 'Később', icon: 'calendar-time' }
  };
  if (items.length === 0) return `<div class="card" style="color:var(--text-muted);font-size:14px;text-align:center;padding:2rem">Nincs ütemezett feladat${calendarFilter!=='all'?' ennek a felhasználónak':''}.</div>`;
  return Object.keys(groupLabels).map(k => {
    const grp = groups[k];
    if (!grp.length) return '';
    const lbl = groupLabels[k];
    return `<div class="cal-group">
      <div class="cal-group-title"><i class="ti ti-${lbl.icon}"></i> ${lbl.title} (${grp.length})</div>
      ${grp.map(it => calItemHtml(it)).join('')}
    </div>`;
  }).join('');
}

function renderSoftware() {
  const isApiTab = softwareTab === 'apikeys';
  const apiAuthed = sessionStorage.getItem('apikey_auth') === '1';

  const tabsHtml = `
  <div style="display:flex;gap:4px;border-bottom:0.5px solid var(--border);margin-bottom:1.25rem">
    <button class="btn" style="border-radius:0;background:transparent;padding:0.65rem 1rem;font-weight:500;color:${softwareTab==='programs'?'var(--accent)':'var(--text-muted)'};border-bottom:2px solid ${softwareTab==='programs'?'var(--accent)':'transparent'};margin-bottom:-0.5px" onclick="switchSwTab('programs')">
      <i class="ti ti-device-desktop"></i> Programok
    </button>
    <button class="btn" style="border-radius:0;background:transparent;padding:0.65rem 1rem;font-weight:500;color:${softwareTab==='apikeys'?'var(--accent)':'var(--text-muted)'};border-bottom:2px solid ${softwareTab==='apikeys'?'var(--accent)':'transparent'};margin-bottom:-0.5px" onclick="switchSwTab('apikeys')">
      <i class="ti ti-key"></i> API kulcsok
    </button>
  </div>`;

  if (isApiTab && !apiAuthed) return renderApiLoginPage(tabsHtml);
  if (isApiTab) return renderApiKeys(tabsHtml);

  const sw = data.software || [];
  const havali = sw.filter(s => s.cycle === 'havi');
  const eves = sw.filter(s => s.cycle === 'éves');
  const havi_total = havali.reduce((s,x) => s + Number(x.cost||0), 0);
  const eves_total = eves.reduce((s,x) => s + Number(x.cost||0), 0);
  const havi_ossz = havi_total + Math.round(eves_total / 12);

  return `
  <div class="page-header">
    <div><div class="page-title">Szoftverek & Kiadások</div></div>
    <button class="btn btn-primary btn-sm" onclick="addSoftware()"><i class="ti ti-plus"></i> Hozzáad</button>
  </div>
  ${tabsHtml}
  <div class="stats-grid" style="margin-bottom:1.25rem">
    <div class="stat-card"><div class="stat-label">Havi kiadás</div><div class="stat-value">${havi_total.toLocaleString('hu')} Ft</div></div>
    <div class="stat-card"><div class="stat-label">Éves kiadás</div><div class="stat-value">${eves_total.toLocaleString('hu')} Ft</div></div>
    <div class="stat-card"><div class="stat-label">Össz. / hó</div><div class="stat-value" style="color:var(--accent)">${havi_ossz.toLocaleString('hu')} Ft</div></div>
    <div class="stat-card"><div class="stat-label">Programok száma</div><div class="stat-value">${sw.length}</div></div>
  </div>

  ${sw.length === 0 ? `<div class="card" style="color:var(--text-muted);font-size:14px;text-align:center;padding:2rem">Még nincs szoftver felvéve.</div>` : `
  <div class="card" style="padding:0;overflow:hidden">
    <table style="width:100%;border-collapse:collapse;font-size:14px">
      <thead>
        <tr style="border-bottom:0.5px solid var(--border);background:var(--surface-2)">
          <th style="padding:0.75rem 1rem;text-align:left;font-weight:500;font-size:13px;color:var(--text-muted)">Program</th>
          <th style="padding:0.75rem 0.5rem;text-align:left;font-weight:500;font-size:13px;color:var(--text-muted)">Kategória</th>
          <th style="padding:0.75rem 0.5rem;text-align:right;font-weight:500;font-size:13px;color:var(--text-muted)">Díj</th>
          <th style="padding:0.75rem 0.5rem;text-align:center;font-weight:500;font-size:13px;color:var(--text-muted)">Ciklus</th>
          <th style="padding:0.75rem 0.75rem;text-align:center;font-weight:500;font-size:13px;color:var(--text-muted)">Aktív</th>
          <th style="width:64px"></th>
        </tr>
      </thead>
      <tbody>
        ${sw.map((s,i) => `
        <tr style="border-bottom:0.5px solid var(--border)${!s.active?' opacity:0.45;':''}" class="sw-row">
          <td style="padding:0.75rem 1rem">
            <div style="font-weight:500">${s.name}</div>
            ${s.note ? `<div style="font-size:12px;color:var(--text-muted)">${s.note}</div>` : ''}
          </td>
          <td style="padding:0.75rem 0.5rem;color:var(--text-muted)">${s.category||'—'}</td>
          <td style="padding:0.75rem 0.5rem;text-align:right;font-weight:500">${Number(s.cost||0).toLocaleString('hu')} Ft</td>
          <td style="padding:0.75rem 0.5rem;text-align:center">
            <span class="badge ${s.cycle==='havi'?'badge-blue':'badge-green'}">${s.cycle}</span>
          </td>
          <td style="padding:0.75rem 0.5rem;text-align:center">
            <div class="task-check ${s.active?'done':''}" style="margin:0 auto" onclick="toggleSoftware(${i})">
              ${s.active?'<i class="ti ti-check" style="font-size:11px"></i>':''}
            </div>
          </td>
          <td style="padding:0.75rem 0.75rem;text-align:right;white-space:nowrap">
            <button class="btn-icon" onclick="editSoftware(${i})"><i class="ti ti-edit" style="font-size:15px"></i></button>
            <button class="btn-icon" onclick="deleteSoftware(${i})" style="color:var(--danger)"><i class="ti ti-trash" style="font-size:15px"></i></button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`}`;
}

function softwareModal(title, s, cb) {
  openModal(title, `
    <div class="form-group"><label class="form-label">Program neve *</label><input class="form-input" id="sw-name" value="${s.name||''}" placeholder="pl. Adobe, Notion, GitHub"></div>
    <div class="info-grid" style="gap:0.75rem">
      <div class="form-group"><label class="form-label">Kategória</label><input class="form-input" id="sw-cat" value="${s.category||''}" placeholder="pl. Design, Marketing"></div>
      <div class="form-group"><label class="form-label">Díj (Ft)</label><input class="form-input" id="sw-cost" type="number" value="${s.cost||''}" placeholder="0"></div>
    </div>
    <div class="form-group"><label class="form-label">Számlázási ciklus</label>
      <select class="form-input" id="sw-cycle">
        <option value="havi" ${(s.cycle||'havi')==='havi'?'selected':''}>Havi</option>
        <option value="éves" ${s.cycle==='éves'?'selected':''}>Éves</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Megjegyzés</label><input class="form-input" id="sw-note" value="${s.note||''}" placeholder="pl. Pro csomag, 3 felhasználó"></div>
  `, cb);
}

function addSoftware() {
  softwareModal('Új szoftver', {}, () => {
    const name = g('sw-name'); if (!name) return alert('A program neve kötelező!');
    data.software.push({ name, category:g('sw-cat'), cost:Number(g('sw-cost'))||0, cycle:g('sw-cycle'), note:g('sw-note'), active:true });
    save(); render();
  });
}
function editSoftware(i) {
  softwareModal('Szoftver szerkesztése', data.software[i], () => {
    const name = g('sw-name'); if (!name) return alert('A program neve kötelező!');
    data.software[i] = { ...data.software[i], name, category:g('sw-cat'), cost:Number(g('sw-cost'))||0, cycle:g('sw-cycle'), note:g('sw-note') };
    save(); render();
  });
}
function toggleSoftware(i) { data.software[i].active = !data.software[i].active; save(); render(); }
function deleteSoftware(i) {
  if (confirm(`Törlöd: "${data.software[i].name}"?`)) { data.software.splice(i,1); save(); render(); }
}
function switchSwTab(tab) { softwareTab = tab; render(); }

/* ── API keys (protected sub-page) ── */
function renderApiLoginPage(tabsHtml) {
  return `
  <div class="page-header">
    <div><div class="page-title">Szoftverek & Kiadások</div></div>
  </div>
  ${tabsHtml}
  <div class="card" style="max-width:400px;margin:2rem auto;text-align:center;padding:2rem 1.5rem">
    <div style="font-size:36px;color:var(--accent);margin-bottom:0.75rem"><i class="ti ti-lock"></i></div>
    <div style="font-size:17px;font-weight:500;margin-bottom:4px">Védett terület</div>
    <div style="font-size:13px;color:var(--text-muted);margin-bottom:1.25rem">Az API kulcsok külön jelszóval védettek</div>
    <input class="login-input" type="password" id="apikey-input" placeholder="••••••••" maxlength="20" onkeydown="if(event.key==='Enter')doApiLogin()">
    <button class="login-btn" onclick="doApiLogin()">Belépés</button>
    <div class="login-error" id="apikey-error"></div>
  </div>`;
}

async function doApiLogin() {
  const val = document.getElementById('apikey-input').value;
  const btn = document.querySelector('#main-content .login-btn');
  btn.textContent = '...'; btn.disabled = true;
  const { data: row } = await sb.from('settings').select('value').eq('key','apikey_password').single();
  btn.textContent = 'Belépés'; btn.disabled = false;
  if (row && val === row.value) {
    sessionStorage.setItem('apikey_auth','1');
    render();
  } else {
    const err = document.getElementById('apikey-error');
    err.textContent = 'Hibás jelszó.';
    document.getElementById('apikey-input').value = '';
    document.getElementById('apikey-input').focus();
    setTimeout(()=>err.textContent='',2500);
  }
}

function renderApiKeys(tabsHtml) {
  const keys = data.apikeys || [];
  return `
  <div class="page-header">
    <div><div class="page-title">Szoftverek & Kiadások</div></div>
    <div style="display:flex;gap:6px">
      <button class="btn btn-ghost btn-sm" onclick="sessionStorage.removeItem('apikey_auth');render()"><i class="ti ti-lock"></i> Kilépés</button>
      <button class="btn btn-primary btn-sm" onclick="addApiKey()"><i class="ti ti-plus"></i> Új kulcs</button>
    </div>
  </div>
  ${tabsHtml}
  ${keys.length === 0 ? `<div class="card" style="color:var(--text-muted);font-size:14px;text-align:center;padding:2rem">Még nincsenek API kulcsok.</div>` :
  `<div style="display:grid;gap:0.75rem">${keys.map((k,i) => `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:0.75rem;margin-bottom:0.5rem">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <div style="font-weight:500">${k.service}</div>
            ${k.env ? `<span class="badge badge-blue">${k.env}</span>` : ''}
          </div>
          ${k.note ? `<div style="font-size:13px;color:var(--text-muted);margin-top:2px">${k.note}</div>` : ''}
        </div>
        <div style="display:flex;gap:2px;flex-shrink:0">
          <button class="btn-icon" onclick="editApiKey(${i})"><i class="ti ti-edit" style="font-size:15px"></i></button>
          <button class="btn-icon" onclick="deleteApiKey(${i})" style="color:var(--danger)"><i class="ti ti-trash" style="font-size:15px"></i></button>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;background:var(--surface-2);padding:0.5rem 0.75rem;border-radius:var(--radius);font-family:monospace;font-size:13px">
        <span style="flex:1;overflow-x:auto;white-space:nowrap" id="key-${i}">${k.visible ? k.key : '•'.repeat(Math.min(32, (k.key||'').length))}</span>
        <button class="btn-icon" onclick="toggleKeyVisible(${i})" title="${k.visible?'Elrejt':'Mutat'}"><i class="ti ti-${k.visible?'eye-off':'eye'}" style="font-size:15px"></i></button>
        <button class="btn-icon" onclick="copyKey(${i})" title="Másol"><i class="ti ti-copy" style="font-size:15px"></i></button>
      </div>
    </div>`).join('')}</div>`}`;
}

function apiKeyModal(title, k, cb) {
  openModal(title, `
    <div class="form-group"><label class="form-label">Szolgáltatás *</label><input class="form-input" id="ak-service" value="${k.service||''}" placeholder="pl. OpenAI, Stripe, Google Maps"></div>
    <div class="form-group"><label class="form-label">API kulcs *</label><textarea class="form-input" id="ak-key" style="font-family:monospace;font-size:13px">${k.key||''}</textarea></div>
    <div class="info-grid" style="gap:0.75rem">
      <div class="form-group"><label class="form-label">Környezet</label>
        <select class="form-input" id="ak-env">
          <option value="" ${!k.env?'selected':''}>—</option>
          <option value="production" ${k.env==='production'?'selected':''}>Production</option>
          <option value="test" ${k.env==='test'?'selected':''}>Test</option>
          <option value="dev" ${k.env==='dev'?'selected':''}>Dev</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Megjegyzés</label><input class="form-input" id="ak-note" value="${k.note||''}" placeholder="pl. Fő fiók, lejárat: 2027"></div>
  `, cb);
}

function addApiKey() {
  apiKeyModal('Új API kulcs', {}, () => {
    const service = g('ak-service'), key = g('ak-key');
    if (!service || !key) return alert('A szolgáltatás és a kulcs kötelező!');
    data.apikeys.push({ service, key, env:g('ak-env'), note:g('ak-note'), visible:false });
    save(); render();
  });
}
function editApiKey(i) {
  apiKeyModal('API kulcs szerkesztése', data.apikeys[i], () => {
    const service = g('ak-service'), key = g('ak-key');
    if (!service || !key) return alert('A szolgáltatás és a kulcs kötelező!');
    data.apikeys[i] = { ...data.apikeys[i], service, key, env:g('ak-env'), note:g('ak-note') };
    save(); render();
  });
}
function deleteApiKey(i) {
  if (confirm(`Törlöd a "${data.apikeys[i].service}" kulcsot?`)) { data.apikeys.splice(i,1); save(); render(); }
}
function toggleKeyVisible(i) { data.apikeys[i].visible = !data.apikeys[i].visible; render(); }
function copyKey(i) {
  navigator.clipboard.writeText(data.apikeys[i].key).then(()=>{
    const el = document.getElementById('key-'+i);
    const old = el.textContent;
    el.textContent = '✓ Másolva';
    setTimeout(()=>render(),1200);
  });
}

/* ── Modal ── */
function openModal(title, body, cb) {
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.getElementById('modal-save').onclick=()=>{ cb(); closeModal(); };
  setTimeout(()=>document.querySelector('#modal-body .form-input')?.focus(),80);
}
function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
function overlayClick(e) { if(e.target===e.currentTarget) closeModal(); }
function g(id) { return (document.getElementById(id)?.value||'').trim(); }

if (sessionStorage.getItem('auth') === '1') loadData(); else render();
</script>
</body>

<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Takarítás igénylése</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f3; --surface: #ffffff; --border: rgba(0,0,0,0.1);
  --text: #1a1a18; --text-muted: #888780; --accent: #3b6de8; --radius: 8px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 1.5rem 1rem; }
.wrap { max-width: 480px; margin: 0 auto; }
.header { text-align: center; margin-bottom: 1.5rem; }
.header .icon { font-size: 34px; color: var(--accent); margin-bottom: 0.5rem; }
.header h1 { font-size: 20px; font-weight: 600; }
.header p { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
.card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 14px; padding: 1.5rem 1.25rem; }
.form-group { margin-bottom: 1rem; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
.form-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.form-input { width: 100%; padding: 0.6rem 0.75rem; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 15px; font-family: inherit; background: var(--surface); color: var(--text); }
.form-input:focus { outline: none; border-color: var(--accent); }
textarea.form-input { min-height: 90px; resize: vertical; }
.req { color: var(--accent); }
.submit-btn { width: 100%; padding: 0.75rem; font-size: 15px; font-weight: 500; border-radius: var(--radius); background: var(--accent); color: #fff; border: none; cursor: pointer; font-family: inherit; margin-top: 0.5rem; }
.submit-btn:hover { background: #2d5cd4; }
.submit-btn:disabled { opacity: 0.6; cursor: default; }
.error-msg { font-size: 13px; color: #e24b4a; margin-top: 0.5rem; text-align: center; min-height: 18px; }
.success-box { text-align: center; padding: 2.5rem 1.5rem; }
.success-box .icon { font-size: 46px; color: #2d9e6b; margin-bottom: 1rem; }
.success-box h2 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
.success-box p { font-size: 14px; color: var(--text-muted); }
@media (max-width: 420px) { .form-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="icon"><i class="ti ti-spray"></i></div>
    <h1>Takarítás igénylése</h1>
    <p>Töltsd ki az alábbi űrlapot, és hamarosan felvesszük veled a kapcsolatot.</p>
  </div>
  <div class="card" id="form-card">
    <form id="job-form">
      <div class="form-group">
        <label class="form-label">Név <span class="req">*</span></label>
        <input class="form-input" id="f-name" required placeholder="Teljes név">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Telefonszám <span class="req">*</span></label>
          <input class="form-input" id="f-phone" required placeholder="+36 30 123 4567">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" id="f-email" type="email" placeholder="nev@email.hu">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Cím / helyszín</label>
        <input class="form-input" id="f-address" placeholder="Ahol a takarítást kéred">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Ingatlan típusa</label>
          <select class="form-input" id="f-proptype">
            <option value="">— válassz —</option>
            <option value="lakas">Lakás</option>
            <option value="haz">Ház</option>
            <option value="iroda">Iroda</option>
            <option value="egyeb">Egyéb</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Terület (m²)</label>
          <input class="form-input" id="f-area" type="number" min="0" placeholder="pl. 65">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Milyen takarítást szeretnél?</label>
        <select class="form-input" id="f-service">
          <option value="">— válassz —</option>
          <option value="nagytakaritas">Alkalmi nagytakarítás</option>
          <option value="rendszeres">Rendszeres takarítás</option>
          <option value="koltozes">Költözés utáni/előtti takarítás</option>
          <option value="epites_utani">Építés utáni takarítás</option>
          <option value="ablaktisztitas">Ablaktisztítás</option>
          <option value="iroda">Irodatakarítás</option>
          <option value="egyeb">Egyéb</option>
        </select>
      </div>
      <div class="form-group" id="freq-group" style="display:none">
        <label class="form-label">Milyen gyakran?</label>
        <select class="form-input" id="f-freq">
          <option value="">— válassz —</option>
          <option value="heti">Heti</option>
          <option value="ketheti">Kétheti</option>
          <option value="havi">Havi</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Kívánt időpont</label>
        <input class="form-input" id="f-date" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">Üzenet, részletek</label>
        <textarea class="form-input" id="f-message" placeholder="Bármi, amit fontosnak tartasz elmondani…"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Honnan hallottál rólunk?</label>
        <select class="form-input" id="f-source">
          <option value="">— válassz —</option>
          <option value="Google">Google</option>
          <option value="Facebook">Facebook</option>
          <option value="Instagram">Instagram</option>
          <option value="Ajánlás">Ajánlás</option>
          <option value="Egyéb">Egyéb</option>
        </select>
      </div>
      <button class="submit-btn" type="submit" id="submit-btn">Küldés</button>
      <div class="error-msg" id="error-msg"></div>
    </form>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xausvinlfcdcgkkjjlox.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhdXN2aW5sZmNkY2dra2pqbG94Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MjUzODgsImV4cCI6MjA5ODQwMTM4OH0.Qgf7X662VSnM-iCw6F3jPyRo4xZmodVT_dTpqITx-PE';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

document.getElementById('f-service').addEventListener('change', e => {
  document.getElementById('freq-group').style.display = e.target.value === 'rendszeres' ? 'block' : 'none';
});

document.getElementById('job-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const err = document.getElementById('error-msg');
  const name = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  if (!name || !phone) { err.textContent = 'A név és a telefonszám megadása kötelező.'; return; }
  btn.disabled = true; btn.textContent = 'Küldés…'; err.textContent = '';

  const payload = {
    name, phone,
    email: document.getElementById('f-email').value.trim() || null,
    address: document.getElementById('f-address').value.trim() || null,
    property_type: document.getElementById('f-proptype').value || null,
    area_m2: document.getElementById('f-area').value ? Number(document.getElementById('f-area').value) : null,
    service_type: document.getElementById('f-service').value || null,
    frequency: document.getElementById('f-freq').value || null,
    preferred_date: document.getElementById('f-date').value || null,
    message: document.getElementById('f-message').value.trim() || null,
    source: document.getElementById('f-source').value || null,
    status: 'új'
  };

  const { error } = await sb.from('incoming_jobs').insert(payload);
  if (error) {
    btn.disabled = false; btn.textContent = 'Küldés';
    err.textContent = 'Hiba történt a küldés során, próbáld újra.';
    return;
  }
  document.getElementById('form-card').innerHTML = `
    <div class="success-box">
      <div class="icon"><i class="ti ti-circle-check"></i></div>
      <h2>Köszönjük a megkeresést!</h2>
      <p>Hamarosan felvesszük veled a kapcsolatot.</p>
    </div>`;
});
</script>
</body>
</html>
